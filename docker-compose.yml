services:
  postgres:
    image: postgres:15-alpine
    container_name: pd_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: documentes
    ports:
      - "5433:5432"
    volumes:
      - pd_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: pd_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/documentes?sslmode=disable
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me-in-prod-please-please}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me-in-prod-please-please}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
      STORAGE_DRIVER: local
      STORAGE_LOCAL_PATH: /app/storage/documents
      MAX_UPLOAD_MB: "20"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - pd_documents:/app/storage/documents

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
    container_name: pd_frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"

volumes:
  pd_pgdata:
  pd_documents:
