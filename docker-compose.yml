services:
  postgres:
    image: postgres:15-alpine
    container_name: pd_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: documentes
    ports:
      - "5433:5432"
    volumes:
      - pd_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: pd_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/documentes?sslmode=disable
      # No insecure fallback: `docker compose up` fails fast unless real secrets
      # are provided via env / .env (generate with `openssl rand -hex 32`).
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET must be set (openssl rand -hex 32)}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set (openssl rand -hex 32)}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
      STORAGE_DRIVER: local
      STORAGE_LOCAL_PATH: /app/storage/documents
      MAX_UPLOAD_MB: "20"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    volumes:
      - pd_documents:/app/storage/documents
      - pd_avatars:/app/storage/avatars

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
        # basePath/rewrites are baked at build time (next.config.mjs), so the
        # backend origin for rewrites must be passed as a build arg too.
        BACKEND_URL: ${BACKEND_URL:-http://backend:8080}
    container_name: pd_frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"

volumes:
  pd_pgdata:
  pd_documents:
  pd_avatars:
